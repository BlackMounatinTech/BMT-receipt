# Render service — BMT Receipt Tool (Streamlit app, like the BMDW quoting software).
services:
  - type: web
    name: bmt-receipt
    runtime: python
    region: oregon
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run receipt_app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      # Set the actual values in the Render dashboard (Environment tab).
      # These let the Send button email the receipt from the company Gmail.
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      # Point the app at the persistent disk so leads_log.csv survives deploys.
      - key: BMT_DATA_DIR
        value: /var/data
    autoDeploy: true
    # Persistent disk — survives EVERY deploy. Holds leads_log.csv (the contacts
    # /prospects list) so it never gets wiped on a push again. Same setup the
    # BMDW estimator uses. 1 GB is plenty for a single operator for years.
    disk:
      name: bmt-data
      mountPath: /var/data
      sizeGB: 1
